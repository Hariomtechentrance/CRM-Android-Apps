version: 2
updates:
  # ── Flutter & Dart Dependencies ─────────────────────────────
  - package-ecosystem: "pub"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "security-team"
    labels:
      - "dependencies"
      - "dart"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
    pull-request-branch-name:
      separator: "/"
    allow:
      - dependency-type: "all"
    ignore:
      # Add any packages you want to ignore for major version updates
      - dependency-name: "flutter"
        update-types:
          - "version-update:semver-major"
    # Require security updates to be merged quickly
    raise-on-outdated-dependencies: true
    versioning-strategy: "auto"

  # ── GitHub Actions ─────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci:"
      include: "scope"

  # ── Docker (if using Docker) ────────────────────────────────
  # - package-ecosystem: "docker"
